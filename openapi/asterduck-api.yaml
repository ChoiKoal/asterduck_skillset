          type: string

    WineCreateRequest:
      type: object
      required: [canonical_name, wine_type, country_id, region_id]
      properties:
        canonical_name:
          type: string
          description: |
            와인 이름. 타입별 규칙:
            - Type A (구세계): 아펠라시옹 + 크뤼/특수표기. 생산자 포함 금지. (예: Gevrey-Chambertin Vieilles Vignes)
            - Type B (신세계): 생산자 + 품종. (예: Far Niente Cabernet Sauvignon)
            - Type C (브랜드): 브랜드명. (예: Opus One)
        wine_type:
          type: string
          enum: [red, rose, white_sparkling]
          description: "⚠️ white 단독 사용 불가, white_sparkling 사용"
        producer:
          type: string
          description: 생산자 (도멘/네고시앙/와이너리)
        vintage_year:
          type: integer
          nullable: true
          description: 빈티지 연도 (NV는 null)
        grapes_text:
          type: string
          description: "품종 (쉼표 구분, 예: Pinot Noir)"
        country_id:
          type: integer
          description: 국가 ID (/api/wineduck/countries에서 조회)
        region_id:
          type: integer
          description: 지역 ID (/api/wineduck/countries/{id}/regions에서 조회)
        appellation_id:
          type: integer
          description: 아펠라시옹 ID (/api/wineduck/regions/{id}/appellations에서 조회)

    WineTastingCreateRequest:
      type: object
      properties:
        wine_type:
          type: string
          enum: [red, rose, white_sparkling]
          description: 와인 타입 (필수)
        tasted_at:
          type: string
          format: date
          description: "시음 날짜 (YYYY-MM-DD, 기본: 오늘)"
        sweetness:
          type: integer
          minimum: 1
          maximum: 5
          description: 당도 (1-5)
        acidity:
          type: integer
          minimum: 1
          maximum: 5
          description: 산도 (1-5)
        body:
          type: integer
          minimum: 1
          maximum: 5
          description: 바디 (1-5)
        tannin:
          type: integer
          minimum: 1
          maximum: 5
          description: 타닌 (1-5)
        finish:
          type: integer
          minimum: 1
          maximum: 5
          description: 여운 (1-5)
        aroma_intensity:
          type: integer
          minimum: 1
          maximum: 6
          description: 향 강도 (1-6)
        rating:
          type: number
          minimum: 0
          maximum: 5
          description: 총점 (0.0-5.0)
        one_liner:
          type: string
          description: 한줄평
        repurchase:
          type: boolean
          description: 재구매 의향
        pairing_food:
          type: string
          description: 페어링 음식
        color:
          type: string
          description: "색상 (ruby, garnet, purple 등)"
        drink_window:
          type: string
          enum: [now, within_1_5y, over_5y]
          description: 음용 적기
        price_amount:
          type: number
          description: 가격
        currency_code:
          type: string
          enum: [KRW, USD, EUR]
          default: KRW
        aromas:
          type: array
